<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Descarga la prueba oficial de La puerca está en la pocilga: dash & trash">
    <meta name="author" content="Rex">
    <title>DASH & TRASH - Descarga la Prueba</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff007f; /* Ajustado al rosa encendido de tu imagen */
            --neon-cyan: #5beadc;
            --neon-yellow: #eebb16;
            --bg-dark: #000000;
        }

        body {
            padding: 0;
            margin: 0;
            text-align: center;
            color: #ffffff;
            background-color: var(--bg-dark);
            font-family: 'Share Tech Mono', monospace;
            text-rendering: optimizeLegibility;
            overflow-x: hidden;
        }

        header {
            background-image: linear-gradient(135deg, rgba(255, 0, 127, 0.3) 0%, rgba(91, 234, 220, 0.3) 100%);
            padding: 1.5rem 1rem;
            border-bottom: 4px solid var(--neon-pink);
            font-family: 'VT323', monospace;
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            animation: neon-flicker 2s infinite alternate;
        }

        .container {
            width: 100%;
            padding: 0 1rem;
            margin: 0 auto;
            max-width: 680px; /* Ajustado para enmarcar mejor el pixel art */
        }

        /* CONTENEDOR DEL GIF PIXEL ART (Basado en image_4a0c85.png) */
        .gif-banner-container {
            width: 100%;
            margin-top: 2.5rem;
            border: 4px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.6);
            background-color: #000;
            overflow: hidden;
            line-height: 0;
        }

        .gif-banner {
            width: 100%;
            height: auto;
            /* TRUCO CSS: Mantiene los bordes de los píxeles completamente nítidos */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .brand-header {
            margin: 3rem 0;
        }

        .title-main {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3.8rem;
            font-style: italic;
            font-weight: 900;
            color: var(--neon-yellow);
            letter-spacing: -1px;
            text-transform: uppercase;
            transform: skewX(-12deg);
            line-height: 1;
            margin-bottom: 0.6rem;
            text-shadow: 4px 4px 0px var(--neon-pink), -2px -2px 0px #000;
        }

        @media (max-width: 576px) {
            .title-main { font-size: 2.4rem; }
        }

        .subtitle {
            font-family: 'VT323', monospace;
            font-size: 1.6rem;
            color: var(--neon-cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Sección de descarga */
        .download-section {
            background: #060606;
            border: 3px dashed var(--neon-cyan);
            padding: 3rem 2rem;
            margin: 3rem 0;
        }

        .section-title {
            font-family: 'VT323', monospace;
            color: var(--neon-pink);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        .version-selector {
            margin-bottom: 2.5rem;
        }

        .version-selector label {
            display: block;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 0.8rem;
        }

        .select-style {
            background-color: #111;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--neon-yellow);
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
        }

        .select-style:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(91, 234, 220, 0.4);
        }

        .btn-download {
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
            border: none;
            background-color: var(--neon-yellow);
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            font-size: 1.4rem;
            text-transform: uppercase;
            color: #000000;
            padding: 1.2rem 3.5rem;
            box-shadow: 6px 6px 0px var(--neon-pink);
            transition: all 0.1s ease;
        }

        .btn-download:hover {
            background-color: var(--neon-cyan);
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px var(--neon-pink);
        }

        .btn-download:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px var(--neon-pink);
        }

        .features-grid {
            display: flex;
            flex-wrap: wrap;
            margin: 4rem -1rem 1rem;
            border-top: 2px solid #222;
            padding-top: 2rem;
        }

        .feature-card {
            padding: 1rem;
            flex: 0 0 100%;
            max-width: 100%;
            box-sizing: border-box;
        }
        @media (min-width: 768px) {
            .feature-card { flex: 0 0 50%; max-width: 50%; }
        }

        .feature-card h3 {
            font-family: 'VT323', monospace;
            text-align: left;
            color: var(--neon-cyan);
            font-size: 1.8rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .feature-card p {
            text-align: left;
            color: #aaaaaa;
            font-size: 0.9rem;
            line-height: 1.5rem;
        }

        footer {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            color: #555555;
            margin: 5rem 0 3rem;
            letter-spacing: 2px;
        }

        @keyframes neon-flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px var(--neon-cyan), 0 0 10px var(--neon-cyan);
            }
            20%, 24%, 55% {       
                text-shadow: none;
                color: #222;
            }
        }
    </style>
</head>
<body>


    <div class="container">
        
        <div class="gif-banner-container">
            <img src="sprite-animation.gif" alt="Dash & Trash Gameplay" class="gif-banner">
        </div>

        <div class="brand-header">
            <h1 class="title-main">DASH & TRASH</h1>
            <div class="subtitle">La puerca está en la pocilga</div>
        </div>

        <main class="download-section">
            <h2 class="section-title">> CARGAR ARCHIVO</h2>
            
            <div class="version-selector">
                <label for="game-version">SELECCIONA ENTORNO:</label>
                <select id="game-version" class="select-style" onchange="updateDownloadLink()">
                    <option value="pc">PC WINDOWS (.ZIP)</option>
                    <option value="android">ANDROID (.APK)</option>
                </select>
            </div>

            <a id="download-btn" href="https://github.com/IamRex48/Gip/releases/download/Windows/Gip.D.T.zip" class="btn-download" download="dash-and-trash-pc.zip">
                INICIAR DESCARGA
            </a>
        </main>

        <section class="features-grid">
            <div class="feature-card">
                <h3>[ ACCIÓN INMEDIATA ]</h3>
                <p>Mecánicas rápidas de esquiva y recolección. Limpia la pocilga antes de que se llene de basura.</p>
            </div>
            <div class="feature-card">
                <h3>[ ESTÉTICA AGRADABLE ]</h3>
                <p>Inspirado por obras del pixel art y marcas conocidas..</p>
            </div>
        </section>

        <footer>
            © 2026 Niggames
        </footer>
    </div>

    <script>
        // Configuración de los servidores externos de más de 100MB
        const urlPC = "https://github.com/IamRex48/Gip/releases/download/Windows/Gip.D.T.zip";
        const urlAndroid = "https://github.com/IamRex48/Gip/releases/download/Android/Gip.D.T.apk";

        function updateDownloadLink() {
            const selector = document.getElementById('game-version');
            const downloadBtn = document.getElementById('download-btn');
            const selectedVersion = selector.value;

            if (selectedVersion === 'pc') {
                downloadBtn.href = urlPC;
                downloadBtn.setAttribute('download', 'dash-and-trash-pc.zip');
            } else if (selectedVersion === 'android') {
                downloadBtn.href = urlAndroid;
                downloadBtn.setAttribute('download', 'dash-and-trash-android.apk');
            }
        }
    </script>
</body>
</html>
